#### Experiments

e_0:
  data_dir: "e_0"
  description: "1 AP, 1 culture"
  bank_size: 5
  nn_layers: [5,7,10,8] # input size is no. input metrics, output size should be 4*no_ap
  tolerance: 0.3
  update_rate: 5000000000
  evaluate_rate: 50
  high_novelty: [0,0] # proportion of robots seeking high novelty, corresponding to each culture
  low_novelty: [1.0,1.0]
  fit_select_t: 1 # Number of top fitness candidates to consider in selection
  ap:
    - [0.5,0.5]
  culture:
    - ratio: 1.0
      params0: [0.35,0.5,0.03,0.20] # parameters for initialisation
      # order: Pm, D_m, SC, r0
      belief: "weights0.txt" # nn weights: the file should go in simulator/wh_sim/models/

  influence_r: 50

e_1:
  data_dir: "e_1"
  description: "2 AP, 2 culture"
  bank_size: 5
  nn_layers: [5,7,10,8] # input size is no. input metrics, output size should be 4*no_ap
  tolerance: 0.3
  update_rate: 5000000000
  evaluate_rate: 10000
  high_novelty: [0,0] # proportion of robots seeking high novelty, corresponding to each culture
  low_novelty: [1.0,1.0]
  fit_select_t: 1 # Number of top fitness candidates to consider in selection
  ap:
    - [0.25,0.25]
    - [0.75,0.75]
  culture:
    - ratio: 1.0
      params0: [0.35, 0.5, 0.03, 0.15, 0.35, 0.5, 0.03, 0.15] # parameters for initialisation
      # order: Pm, D_m, SC, r0
      belief: "weights0.txt" # nn weights: the file should go in simulator/wh_sim/models/
    # - ratio: 0.5
    #   params0: [0.35, 0.5, 0.03, 0.3, 0.35, 0.5, 0.03, 0.1]
    #   # order: Pm, D_m, SC, r0
    #   belief: "weights0.txt" # nn weights

  influence_r: 50
